services:
  - type: web
    name: taric-2026
    runtime: node
    plan: free
    buildCommand: npm ci && node scripts/prepare-render-data.mjs && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: OPENAI_API_KEY
        sync: false
