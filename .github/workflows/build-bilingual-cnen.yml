name: Build bilingual CNEN coverage

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bilingual-cnen-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: false

jobs:
  build-source-and-coverage:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install PDF extraction utility
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Download official EUR-Lex sources
        run: |
          mkdir -p data/cache
          curl --fail --location --retry 3 --retry-delay 2 \
            'https://eur-lex.europa.eu/legal-content/EN/TXT/PDF/?uri=CELEX%3A02019XC0329%2802%29-20260213' \
            --output data/cache/cnen-en.pdf
          curl --fail --location --retry 3 --retry-delay 2 \
            'https://eur-lex.europa.eu/legal-content/HU/TXT/PDF/?uri=CELEX%3A02019XC0329%2802%29-20260213' \
            --output data/cache/cnen-hu.pdf
          file data/cache/cnen-en.pdf data/cache/cnen-hu.pdf

      - name: Build paired bilingual source
        run: |
          python3 scripts/build-bilingual-cnen.py \
            data/cache/cnen-en.pdf data/cache/cnen-hu.pdf \
            --output data/generated/cnen-bilingual-source.json \
            --parts-base data/source/cnen-bilingual-source.json \
            --qa data/source/cnen-bilingual-qa.json

      - name: Resolve ranges against current KN10
        run: |
          npm ci
          node scripts/prepare-render-data.mjs
          node scripts/resolve-bilingual-cnen.mjs
          npm test
          npm run build

      - name: Commit generated source and coverage lists
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -f data/source/cnen-bilingual-source.json.gz.b64.part* \
            data/source/cnen-bilingual-qa.json \
            data/generated/cnen-coverage.json \
            data/generated/cnen-missing.json \
            public/cnen-missing.csv
          if git diff --cached --quiet; then
            echo 'No generated changes.'
          else
            git commit -m 'Generate bilingual CNEN source and KN8 coverage list'
            git push origin HEAD:"${HEAD_BRANCH}"
          fi
